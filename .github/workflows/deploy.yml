name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  PROJECT_NAME: erp-inventory

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ── Job 2: Deploy (main branch only) ────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into Lambda source dirs
        run: |
          pip install boto3 -t src/items/
          pip install boto3 -t src/orders/
          cp -r src/common src/items/common
          cp -r src/common src/orders/common

      - name: Create Terraform zips directory
        run: mkdir -p terraform/zips

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_environment: prod

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_environment: prod

      - name: Get API endpoint
        working-directory: terraform
        run: |
          API_URL=$(terraform output -raw api_endpoint)
          echo "API_ENDPOINT=$API_URL" >> $GITHUB_ENV
          echo "Deployed to: $API_URL"

      - name: Smoke test — health check
        run: |
          echo "Testing GET /items on $API_ENDPOINT"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_ENDPOINT/items")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed with status $STATUS"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Notify on success
        if: success()
        run: echo "Deployment successful - $API_ENDPOINT"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed - check logs above"
